<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 用户管理</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">🏠 仪表板</a>
      <a href="/admin/users.html" class="active">👥 用户管理</a>
      <a href="/admin/managers.html">👤 管理员管理</a>
      <a href="/admin/config.html">🎡 游戏配置</a>
      <a href="/admin/stats.html">📊 数据统计</a>
      <a href="/admin/payment-accounts.html">💳 收款账号</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">
    <div class="section">
      <h2>👥 用户列表</h2>
      <div class="toolbar">
        <input type="search" id="searchInput" placeholder="🔍 按用户名搜索..." oninput="debounceSearch()">
        <button class="btn-primary" onclick="loadUsers(1)">搜索</button>
        <button class="btn-secondary btn-sm" onclick="document.getElementById('searchInput').value=''; loadUsers(1)">清除</button>
      </div>
      <div id="usersList"><p class="no-data">加载中...</p></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- 冻结确认弹窗 -->
  <div class="modal-overlay" id="freezeModal">
    <div class="modal">
      <h3>❄️ 冻结用户</h3>
      <div class="form-group">
        <label>冻结用户：<strong id="freezeUserName"></strong></label>
      </div>
      <div class="form-group">
        <label>冻结原因</label>
        <input type="text" id="freezeReason" placeholder="请输入冻结原因（可选）">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('freezeModal')">取消</button>
        <button class="btn-warning" onclick="confirmFreeze()">确认冻结</button>
      </div>
    </div>
  </div>

  <!-- 重置密码弹窗 -->
  <div class="modal-overlay" id="resetPwModal">
    <div class="modal">
      <h3>🔑 重置密码</h3>
      <div class="form-group">
        <label>用户：<strong id="resetPwUserName"></strong></label>
      </div>
      <div class="form-group">
        <label>新密码（留空则生成随机密码）</label>
        <input type="text" id="newPassword" placeholder="留空则重置为 default123">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('resetPwModal')">取消</button>
        <button class="btn-primary" onclick="confirmResetPassword()">确认重置</button>
      </div>
    </div>
  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) window.location.href = '/admin';
    const TOKEN = adminData ? adminData.token : '';

    let currentPage = 1;
    let totalPages = 1;
    let currentAction = {};
    let searchTimer = null;

    function logout() { sessionStorage.removeItem('adminUser'); window.location.href = '/admin'; }

    function api(url, opts={}) {
      return fetch(url, { ...opts, headers: { 'x-admin-token': TOKEN, 'Content-Type': 'application/json', ...(opts.headers||{}) } }).then(r => r.json());
    }

    function debounceSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadUsers(1), 400);
    }

    function loadUsers(page) {
      currentPage = page;
      const search = document.getElementById('searchInput').value.trim();
      const params = new URLSearchParams({ page, limit: 20 });
      if (search) params.set('search', search);
      api('/api/admin/users?' + params).then(d => {
        if (d.error) { document.getElementById('usersList').innerHTML = '<p class="no-data" style="color:red;">❌ ' + d.error + '</p>'; return; }
        totalPages = Math.ceil(d.total / 20) || 1;
        if (!d.users || d.users.length === 0) {
          document.getElementById('usersList').innerHTML = '<p class="no-data">暂无用户数据</p>';
          renderPagination(d.total);
          return;
        }
        const statusMap = { normal: ['badge-normal','正常'], frozen: ['badge-frozen','已冻结'], deleted: ['badge-deleted','已删除'] };
        let html = '<table><thead><tr><th>用户名</th><th>积分</th><th>现金(盾)</th><th>转盘次数</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
        d.users.forEach(u => {
          const [cls, txt] = statusMap[u.status] || ['',''];
          html += `<tr>
            <td><strong>${esc(u.userId)}</strong></td>
            <td>${(u.points||0).toLocaleString()}</td>
            <td>${(u.cash||0).toLocaleString()}</td>
            <td>${u.spinCount||0}</td>
            <td><span class="badge ${cls}">${txt}</span></td>
            <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-CN') : '-'}</td>
            <td>`;
          if (u.status === 'normal') {
            html += `<button class="btn-warning btn-sm" onclick="openFreezeModal('${esc(u.userId)}')">❄️ 冻结</button>`;
          } else if (u.status === 'frozen') {
            html += `<button class="btn-success btn-sm" onclick="unfreezeUser('${esc(u.userId)}')">✅ 解冻</button>`;
          }
          if (u.status !== 'deleted') {
            html += `<button class="btn-info btn-sm" onclick="openResetPwModal('${esc(u.userId)}')">🔑 重置密码</button>`;
            html += `<button class="btn-danger btn-sm" onclick="deleteUser('${esc(u.userId)}')">🗑️ 删除</button>`;
          }
          html += '</td></tr>';
        });
        html += '</tbody></table>';
        document.getElementById('usersList').innerHTML = html;
        renderPagination(d.total);
      }).catch(() => { document.getElementById('usersList').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接服务器</p>'; });
    }

    function renderPagination(total) {
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = `<span class="page-info">共 ${total} 条记录</span>`; return; }
      let html = `<button onclick="loadUsers(1)" ${currentPage===1?'disabled':''}>«</button>`;
      html += `<button onclick="loadUsers(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
      html += `<span class="page-info">第 ${currentPage} / ${totalPages} 页，共 ${total} 条</span>`;
      html += `<button onclick="loadUsers(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>›</button>`;
      html += `<button onclick="loadUsers(${totalPages})" ${currentPage>=totalPages?'disabled':''}>»</button>`;
      el.innerHTML = html;
    }

    function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function openFreezeModal(uid) {
      currentAction.freezeUid = uid;
      document.getElementById('freezeUserName').textContent = uid;
      document.getElementById('freezeReason').value = '';
      document.getElementById('freezeModal').classList.add('show');
    }
    function confirmFreeze() {
      const uid = currentAction.freezeUid;
      const reason = document.getElementById('freezeReason').value.trim();
      api('/api/admin/users/' + encodeURIComponent(uid) + '/freeze', { method:'PATCH', body: JSON.stringify({ reason }) }).then(d => {
        closeModal('freezeModal');
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadUsers(currentPage);
      });
    }

    function unfreezeUser(uid) {
      if (!confirm('确认解冻用户 "' + uid + '" 吗？')) return;
      api('/api/admin/users/' + encodeURIComponent(uid) + '/unfreeze', { method:'PATCH' }).then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadUsers(currentPage);
      });
    }

    function deleteUser(uid) {
      if (!confirm('⚠️ 确认删除用户 "' + uid + '" 吗？此操作不可恢复！')) return;
      api('/api/admin/users/' + encodeURIComponent(uid), { method:'DELETE' }).then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadUsers(currentPage);
      });
    }

    function openResetPwModal(uid) {
      currentAction.resetPwUid = uid;
      document.getElementById('resetPwUserName').textContent = uid;
      document.getElementById('newPassword').value = '';
      document.getElementById('resetPwModal').classList.add('show');
    }
    function confirmResetPassword() {
      const uid = currentAction.resetPwUid;
      const newPassword = document.getElementById('newPassword').value.trim();
      const body = newPassword ? { newPassword } : {};
      api('/api/admin/users/' + encodeURIComponent(uid) + '/reset-password', { method:'PATCH', body: JSON.stringify(body) }).then(d => {
        closeModal('resetPwModal');
        if (d.error) { alert('❌ ' + d.error); } else { alert('✅ 密码已重置\n新密码：' + d.newPassword); }
        loadUsers(currentPage);
      });
    }

    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    document.querySelectorAll('.modal-overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); }));

    loadUsers(1);
  </script>
</body>
</html>
