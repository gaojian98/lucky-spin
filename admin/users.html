<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 用户管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 1.2rem; }
    .topbar .nav a {
      color: white;
      text-decoration: none;
      margin-left: 18px;
      font-size: 0.9rem;
      opacity: 0.85;
    }
    .topbar .nav a:hover { opacity: 1; }
    .topbar .logout {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 18px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #444; }
    .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .search-row input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 220px;
    }
    .search-row button {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
    .no-data { text-align: center; color: #aaa; padding: 24px; }
    #userDetail {
      background: #f0f4ff;
      border: 1px solid #c5d3f7;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      display: none;
    }
    #userDetail h3 { margin-bottom: 10px; color: #444; }
    #userDetail p { margin-bottom: 6px; font-size: 0.9rem; color: #555; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 用户管理</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">仪表板</a>
      <a href="/admin/users.html">用户管理</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">
    <div class="section">
      <h2>🔍 查询用户</h2>
      <div class="search-row">
        <input type="text" id="searchId" placeholder="输入用户名查询" onkeydown="if(event.key==='Enter')searchUser()">
        <button onclick="searchUser()">查 询</button>
      </div>
      <div id="userDetail"></div>
    </div>

    <div class="section">
      <h2>📋 充值历史查询</h2>
      <div class="search-row">
        <input type="text" id="historyUserId" placeholder="输入用户名" onkeydown="if(event.key==='Enter')loadHistory()">
        <button onclick="loadHistory()">查询充值记录</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) {
      window.location.href = '/admin';
    }

    function logout() {
      sessionStorage.removeItem('adminUser');
      window.location.href = '/admin';
    }

    function searchUser() {
      const userId = document.getElementById('searchId').value.trim();
      if (!userId) { alert('❗ 请输入用户名'); return; }

      fetch('/user/' + encodeURIComponent(userId))
        .then(r => r.json())
        .then(d => {
          const el = document.getElementById('userDetail');
          el.style.display = 'block';
          if (d.error) {
            el.innerHTML = '<p style="color:red;">❌ ' + d.error + '</p>';
          } else {
            el.innerHTML = `
              <h3>👤 用户：${d.username}</h3>
              <p>🎫 积分：<strong>${(d.points||0).toLocaleString()}</strong></p>
              <p>💵 现金：<strong>${(d.cash||0).toLocaleString()} 越南盾</strong></p>
              <p>🎰 转盘次数：<strong>${d.spinCount||0}</strong></p>
              <p>🏆 总赢取：<strong>${(d.totalWinnings||0).toLocaleString()}</strong></p>
              ${d.prizes && d.prizes.length ? '<p>🎁 实物奖品：' + d.prizes.map(p => p.name).join(', ') + '</p>' : ''}
            `;
          }
        })
        .catch(() => {
          document.getElementById('userDetail').style.display = 'block';
          document.getElementById('userDetail').innerHTML = '<p style="color:red;">❌ 无法连接到服务器</p>';
        });
    }

    function loadHistory() {
      const userId = document.getElementById('historyUserId').value.trim();
      if (!userId) { alert('❗ 请输入用户名'); return; }

      fetch('/recharge/history/' + encodeURIComponent(userId))
        .then(r => r.json())
        .then(d => {
          if (!d.history || d.history.length === 0) {
            document.getElementById('historyList').innerHTML = '<p class="no-data">暂无充值记录</p>';
            return;
          }
          let html = '<table><tr><th>申请ID</th><th>金额</th><th>方式</th><th>状态</th><th>时间</th></tr>';
          const methodMap = { momo: '📱 MoMo', bank: '🏦 银行', zalo: '💬 Zalo', account_cash: '💳 账户现金' };
          const statusMap = { pending: '⏳ 待审核', approved: '✅ 已批准', rejected: '❌ 已拒绝' };
          d.history.forEach(r => {
            html += `<tr>
              <td>${r.id}</td>
              <td>${r.amount.toLocaleString()}</td>
              <td>${methodMap[r.method] || r.method}</td>
              <td>${statusMap[r.status] || r.status}</td>
              <td>${new Date(r.createdAt).toLocaleString('zh-CN')}</td>
            </tr>`;
          });
          html += '</table>';
          document.getElementById('historyList').innerHTML = html;
        })
        .catch(() => {
          document.getElementById('historyList').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接到服务器</p>';
        });
    }
  </script>
</body>
</html>
