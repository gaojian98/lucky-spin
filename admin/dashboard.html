<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 管理后台仪表板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 1.2rem; }
    .topbar .nav a {
      color: white;
      text-decoration: none;
      margin-left: 18px;
      font-size: 0.9rem;
      opacity: 0.85;
    }
    .topbar .nav a:hover { opacity: 1; }
    .topbar .logout {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 18px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .stat-card .label { color: #888; font-size: 0.85rem; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #333; }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #444; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: bold;
    }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d4edda; color: #155724; }
    .badge-rejected { background: #f8d7da; color: #721c24; }
    button { padding: 6px 14px; margin: 2px; cursor: pointer; border: none; border-radius: 6px; font-size: 0.85rem; }
    .btn-approve { background: #28a745; color: white; }
    .btn-reject { background: #dc3545; color: white; }
    .btn-primary { background: #667eea; color: white; }
    input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    .form-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .no-data { text-align: center; color: #aaa; padding: 24px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">仪表板</a>
      <a href="/admin/users.html">用户管理</a>
    </div>
  </div>

  <div class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">充值申请总数</div>
        <div class="value" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <div class="label">待审核</div>
        <div class="value" id="pendingCount" style="color:#856404;">0</div>
      </div>
      <div class="stat-card">
        <div class="label">已批准</div>
        <div class="value" id="approvedCount" style="color:#155724;">0</div>
      </div>
      <div class="stat-card">
        <div class="label">已拒绝</div>
        <div class="value" id="rejectedCount" style="color:#721c24;">0</div>
      </div>
    </div>

    <div class="section">
      <h2>💰 充值申请管理</h2>
      <div id="requestsList"><p class="no-data">加载中...</p></div>
    </div>

    <div class="section">
      <h2>🔧 直接充值用户</h2>
      <div class="form-row">
        <input type="text" id="directUserId" placeholder="用户名" style="width:160px;">
        <input type="number" id="directAmount" placeholder="积分数量" style="width:140px;">
        <button class="btn-primary" onclick="directRecharge()">💎 直接充值</button>
      </div>
    </div>
  </div>

  <script>
    // 使用 localStorage 而不是 sessionStorage
    const adminToken = localStorage.getItem('adminToken');
    const adminUser = localStorage.getItem('adminUser');
    
    if (!adminToken || !adminUser) {
      window.location.href = 'index.html';
    }

    function logout() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      window.location.href = 'index.html';
    }

    function loadRequests() {
      fetch('/recharge/requests')
        .then(r => r.json())
        .then(d => {
          document.getElementById('totalCount').textContent = d.total;
          const pending = d.requests.filter(r => r.status === 'pending').length;
          const approved = d.requests.filter(r => r.status === 'approved').length;
          const rejected = d.requests.filter(r => r.status === 'rejected').length;
          document.getElementById('pendingCount').textContent = pending;
          document.getElementById('approvedCount').textContent = approved;
          document.getElementById('rejectedCount').textContent = rejected;

          if (d.requests.length === 0) {
            document.getElementById('requestsList').innerHTML = '<p class="no-data">暂无充值申请</p>';
            return;
          }

          let html = '<table><tr><th>申请ID</th><th>用户</th><th>金额</th><th>方式</th><th>状态</th><th>申请时间</th><th>操作</th></tr>';
          d.requests.forEach(r => {
            const statusMap = { pending: ['badge-pending','⏳ 待审核'], approved: ['badge-approved','✅ 已批准'], rejected: ['badge-rejected','❌ 已拒绝'] };
            const [cls, txt] = statusMap[r.status] || ['',''];
            const methodMap = { momo: '📱 MoMo', bank: '🏦 银行', zalo: '💬 Zalo', account_cash: '💳 账户现金' };
            html += `<tr>
              <td>${r.id}</td>
              <td><strong>${r.userId}</strong></td>
              <td><strong>${r.amount.toLocaleString()}</strong></td>
              <td>${methodMap[r.method] || r.method}</td>
              <td><span class="badge ${cls}">${txt}</span></td>
              <td>${new Date(r.createdAt).toLocaleString('zh-CN')}</td>
              <td>`;
            if (r.status === 'pending') {
              html += `<button class="btn-approve" onclick="approveRequest(${r.id})">✅ 批准</button>`;
              html += `<button class="btn-reject" onclick="rejectRequest(${r.id})">❌ 拒绝</button>`;
            } else {
              html += '<span style="color:#aaa;">已处理</span>';
            }
            html += '</td></tr>';
          });
          html += '</table>';
          document.getElementById('requestsList').innerHTML = html;
        })
        .catch(() => {
          document.getElementById('requestsList').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接到服务器</p>';
        });
    }

    function approveRequest(requestId) {
      if (!confirm('确认批准该充值申请吗？')) return;
      fetch('/recharge/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestId, adminPassword: 'admin123' })
      })
      .then(r => r.json())
      .then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadRequests();
      });
    }

    function rejectRequest(requestId) {
      const reason = prompt('拒绝理由（默认：管理员拒绝）：');
      fetch('/recharge/reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestId, reason: reason || '管理员拒绝', adminPassword: 'admin123' })
      })
      .then(r => r.json())
      .then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadRequests();
      });
    }

    function directRecharge() {
      const userId = document.getElementById('directUserId').value.trim();
      const amount = parseInt(document.getElementById('directAmount').value);
      if (!userId) { alert('❗ 请输入用户名'); return; }
      if (!amount || amount < 1000) { alert('❗ 金额最少 1000 积分'); return; }
      if (!confirm('确认给 ' + userId + ' 充值 ' + amount.toLocaleString() + ' 积分吗？')) return;

      fetch('/recharge/direct', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, amount, adminPassword: 'admin123', reason: '后台直接充值' })
      })
      .then(r => r.json())
      .then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message + '\n用户新积分：' + d.userNewPoints.toLocaleString());
        document.getElementById('directUserId').value = '';
        document.getElementById('directAmount').value = '';
        loadRequests();
      });
    }

    loadRequests();
    setInterval(loadRequests, 5000);
  </script>
  <script src="nav.js"></script>
</body>
</html>
