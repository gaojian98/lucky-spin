<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 管理后台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); text-align: center; }
    .stat-card .label { color: #999; font-size: 0.9rem; margin-bottom: 10px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #667eea; }
    .section { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 24px; }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #444; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="margin-bottom: 30px; color: #333;">📊 管理后台仪表板</h1>
    
    <div class="stats">
      <div class="stat-card">
        <div class="label">充值申请</div>
        <div class="value" id="rechargeCount">0</div>
      </div>
      <div class="stat-card">
        <div class="label">待审核</div>
        <div class="value" id="pendingCount">0</div>
      </div>
      <div class="stat-card">
        <div class="label">已批准</div>
        <div class="value" id="approvedCount">0</div>
      </div>
      <div class="stat-card">
        <div class="label">已拒绝</div>
        <div class="value" id="rejectedCount">0</div>
      </div>
    </div>

    <div class="section">
      <h2>📋 充值申请列表</h2>
      <div id="rechargeList"></div>
    </div>
  </div>

  <script>
    const adminToken = localStorage.getItem('adminToken');
    if (!adminToken) {
      window.location.href = 'index.html';
    }

    function loadData() {
      fetch('/api/admin/recharge/requests')
        .then(r => r.json())
        .then(data => {
          document.getElementById('rechargeCount').innerText = (data.requests || []).length;
          document.getElementById('pendingCount').innerText = (data.requests || []).filter(r => r.status === 'pending').length;
          document.getElementById('approvedCount').innerText = (data.requests || []).filter(r => r.status === 'approved').length;
          document.getElementById('rejectedCount').innerText = (data.requests || []).filter(r => r.status === 'rejected').length;

          let html = '<table><tr><th>用户</th><th>金额</th><th>方式</th><th>状态</th><th>时间</th></tr>';
          (data.requests || []).forEach(r => {
            const statusMap = { pending: '⏳ 待审核', approved: '✅ 已批准', rejected: '❌ 已拒绝' };
            html += `<tr><td>${r.userId}</td><td>${r.amount}</td><td>${r.method}</td><td>${statusMap[r.status]}</td><td>${new Date(r.createdAt).toLocaleString('zh-CN')}</td></tr>`;
          });
          html += '</table>';
          document.getElementById('rechargeList').innerHTML = html;
        })
        .catch(e => {
          console.error(e);
          document.getElementById('rechargeList').innerHTML = '<p style="color:red;">无法加载数据</p>';
        });
    }

    loadData();
    setInterval(loadData, 5000); // 每 5 秒刷新一次
  </script>
  <script src="nav.js"></script>
</body>
</html>
