<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 管理后台仪表板</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html" class="active">🏠 仪表板</a>
      <a href="/admin/users.html">👥 用户管理</a>
      <a href="/admin/managers.html">👤 管理员管理</a>
      <a href="/admin/config.html">🎡 游戏配置</a>
      <a href="/admin/stats.html">📊 数据统计</a>
      <a href="/admin/payment-accounts.html">💳 收款账号</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="label">用户总数</div><div class="value" id="totalUsers">-</div></div>
      <div class="stat-card"><div class="label">总转盘次数</div><div class="value" id="totalSpins">-</div></div>
      <div class="stat-card"><div class="label">中奖记录数</div><div class="value" id="totalRecords">-</div></div>
      <div class="stat-card"><div class="label">待审充值</div><div class="value" id="pendingRecharge" style="color:#856404;">-</div></div>
      <div class="stat-card"><div class="label">已批准充值积分</div><div class="value" id="totalRecharge">-</div></div>
      <div class="stat-card"><div class="label">用户总现金(盾)</div><div class="value" id="totalCash">-</div></div>
    </div>

    <div class="section">
      <h2>💰 充值申请管理</h2>
      <div id="requestsList"><p class="no-data">加载中...</p></div>
    </div>

    <div class="section">
      <h2>🔧 直接充值用户</h2>
      <div class="form-row" style="margin-top:4px;">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="directUserId" placeholder="输入用户名" style="width:160px;">
        </div>
        <div class="form-group">
          <label>积分数量</label>
          <input type="number" id="directAmount" placeholder="积分数量" style="width:140px;">
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn-primary" onclick="directRecharge()">💎 直接充值</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) window.location.href = '/admin';
    const TOKEN = adminData ? adminData.token : '';

    function logout() {
      sessionStorage.removeItem('adminUser');
      window.location.href = '/admin';
    }

    function apiGet(url) {
      return fetch(url, { headers: { 'x-admin-token': TOKEN } }).then(r => r.json());
    }

    function loadSummary() {
      apiGet('/api/admin/stats/summary').then(d => {
        if (d.error) return;
        document.getElementById('totalUsers').textContent = d.totalUsers;
        document.getElementById('totalSpins').textContent = d.totalSpins.toLocaleString();
        document.getElementById('totalRecords').textContent = d.totalWinRecords.toLocaleString();
        document.getElementById('pendingRecharge').textContent = d.pendingRecharge;
        document.getElementById('totalRecharge').textContent = d.totalRecharge.toLocaleString();
        document.getElementById('totalCash').textContent = d.totalCash.toLocaleString();
      });
    }

    function loadRequests() {
      fetch('/recharge/requests')
        .then(r => r.json())
        .then(d => {
          if (!d.requests || d.requests.length === 0) {
            document.getElementById('requestsList').innerHTML = '<p class="no-data">暂无充值申请</p>';
            return;
          }
          let html = '<table><thead><tr><th>申请ID</th><th>用户</th><th>金额(积分)</th><th>方式</th><th>状态</th><th>申请时间</th><th>操作</th></tr></thead><tbody>';
          const methodMap = { momo: '📱 MoMo', bank: '🏦 银行', zalo: '💬 Zalo', account_cash: '💳 账户现金' };
          const statusMap = { pending: ['badge-pending','⏳ 待审核'], approved: ['badge-approved','✅ 已批准'], rejected: ['badge-rejected','❌ 已拒绝'] };
          d.requests.forEach(r => {
            const [cls, txt] = statusMap[r.status] || ['',''];
            html += `<tr>
              <td>${r.id}</td><td><strong>${r.userId}</strong></td>
              <td><strong>${r.amount.toLocaleString()}</strong></td>
              <td>${methodMap[r.method] || r.method}</td>
              <td><span class="badge ${cls}">${txt}</span></td>
              <td>${new Date(r.createdAt).toLocaleString('zh-CN')}</td>
              <td>`;
            if (r.status === 'pending') {
              html += `<button class="btn-success btn-sm" onclick="approveRequest(${r.id})">✅ 批准</button>`;
              html += `<button class="btn-danger btn-sm" onclick="rejectRequest(${r.id})">❌ 拒绝</button>`;
            } else { html += '<span style="color:#aaa;font-size:0.82rem;">已处理</span>'; }
            html += '</td></tr>';
          });
          html += '</tbody></table>';
          document.getElementById('requestsList').innerHTML = html;
        })
        .catch(() => { document.getElementById('requestsList').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接服务器</p>'; });
    }

    function approveRequest(requestId) {
      if (!confirm('确认批准该充值申请吗？')) return;
      fetch('/recharge/approve', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ requestId, adminPassword:'admin123' }) })
        .then(r=>r.json()).then(d=>{ alert(d.error ? '❌ '+d.error : '✅ '+d.message); loadRequests(); loadSummary(); });
    }
    function rejectRequest(requestId) {
      const reason = prompt('拒绝理由（默认：管理员拒绝）：');
      if (reason === null) return;
      fetch('/recharge/reject', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ requestId, reason: reason.trim() || '管理员拒绝', adminPassword:'admin123' }) })
        .then(r=>r.json()).then(d=>{ alert(d.error ? '❌ '+d.error : '✅ '+d.message); loadRequests(); loadSummary(); });
    }
    function directRecharge() {
      const userId = document.getElementById('directUserId').value.trim();
      const amount = parseInt(document.getElementById('directAmount').value);
      if (!userId) { alert('❗ 请输入用户名'); return; }
      if (!amount || amount < 1000) { alert('❗ 金额最少 1000 积分'); return; }
      if (!confirm('确认给 ' + userId + ' 充值 ' + amount.toLocaleString() + ' 积分吗？')) return;
      fetch('/recharge/direct', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ userId, amount, adminPassword:'admin123', reason:'后台直接充值' }) })
        .then(r=>r.json()).then(d=>{ alert(d.error ? '❌ '+d.error : '✅ '+d.message+'\n用户新积分：'+d.userNewPoints.toLocaleString()); document.getElementById('directUserId').value=''; document.getElementById('directAmount').value=''; loadRequests(); loadSummary(); });
    }

    loadSummary();
    loadRequests();
    setInterval(() => { loadRequests(); loadSummary(); }, 10000);
  </script>
</body>
</html>
