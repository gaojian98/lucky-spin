<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 数据统计 - 管理后台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }
        .content { padding: 30px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { font-size: 0.9rem; opacity: 0.9; margin-bottom: 12px; font-weight: 500; }
        .stat-value { font-size: 2.5rem; font-weight: bold; }
        
        .section {
            margin-bottom: 40px;
        }
        .section h2 {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        .search-box button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 500;
        }
        .search-box button:hover { background: #764ba2; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th {
            background: #f8f9fa;
            color: #333;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e9ecef;
        }
        tr:hover { background: #f8f9fa; }
        
        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.3); }
        
        .loading { text-align: center; color: #999; padding: 30px; }
        .error { color: #dc3545; padding: 15px; background: #f8d7da; border-radius: 4px; margin: 15px 0; }
        .success { color: #155724; padding: 15px; background: #d4edda; border-radius: 4px; margin: 15px 0; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
            font-size: 1rem;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover { background: #764ba2; }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
            <header>
            <h1>📊 数据统计中心</h1>
        </header>
        
        <div class="content">
            <div id="message"></div>
            
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>👥 总用户数</h3>
                    <div class="stat-value" id="stat-users">-</div>
                </div>
                <div class="stat-card">
                    <h3>🎯 总转盘次数</h3>
                    <div class="stat-value" id="stat-spins">-</div>
                </div>
                <div class="stat-card">
                    <h3>💰 总奖励金额</h3>
                    <div class="stat-value" id="stat-winnings">-</div>
                </div>
                <div class="stat-card">
                    <h3>📝 中奖记录</h3>
                    <div class="stat-value" id="stat-records">-</div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="refreshStats()">🔄 刷新统计</button>
                <button class="btn btn-success" onclick="exportData()">📥 导出数据</button>
            </div>
            
            <!-- 中奖记录表 -->
            <div class="section">
                <h2>🏆 最近中奖记录</h2>
                <div id="records-container">
                    <div class="loading">加载中...</div>
                </div>
            </div>
            
            <!-- 用户查询 -->
            <div class="section">
                <h2>🔍 用户中奖查询</h2>
                <div class="search-box">
                    <input type="text" id="user-search" placeholder="输入用户ID查询" onkeydown="if(event.key==='Enter')searchUserRecords()">
                    <button onclick="searchUserRecords()">搜索</button>
                </div>
                <div id="search-container"></div>
            </div>
        </div>
    </div>

    <script>
        const adminToken = localStorage.getItem('adminToken');

        if (!adminToken) {
            alert('⚠️ 请先登录');
            window.location.href = 'index.html';
        }

        function showMessage(msg, type = 'success') {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="${type === 'error' ? 'error' : 'success'}">${msg}</div>`;
            setTimeout(() => { msgDiv.innerHTML = ''; }, 5000);
        }

        function refreshStats() {
            loadStats();
            loadRecords();
        }

        function loadStats() {
            fetch('/api/admin/stats/summary', {
                headers: { 'x-admin-token': adminToken }
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage('❌ 错误: ' + data.error, 'error');
                    return;
                }
                document.getElementById('stat-users').textContent = data.totalUsers || 0;
                document.getElementById('stat-spins').textContent = data.totalSpins || 0;
                document.getElementById('stat-winnings').textContent = (data.totalWinnings || 0).toLocaleString();
                document.getElementById('stat-records').textContent = data.totalWinRecords || 0;
            })
            .catch(err => showMessage('❌ 加载失败: ' + err, 'error'));
        }

        function loadRecords() {
            fetch('/api/admin/stats/records?page=1&limit=10', {
                headers: { 'x-admin-token': adminToken }
            })
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('records-container');
                
                if (data.error) {
                    container.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                    return;
                }
                
                if (!data.records || data.records.length === 0) {
                    container.innerHTML = '<div class="loading">暂无记录</div>';
                    return;
                }

                let html = '<table><thead><tr><th>用户ID</th><th>奖品名称</th><th>奖品值</th><th>中奖时间</th></tr></thead><tbody>';
                data.records.forEach(r => {
                    html += `<tr>
                        <td>${r.userId}</td>
                        <td>${r.reward.name}</td>
                        <td>${r.reward.value}</td>
                        <td>${new Date(r.timestamp).toLocaleString('zh-CN')}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('records-container').innerHTML = '<div class="error">❌ 加载失败</div>';
            });
        }

        function searchUserRecords() {
            const userId = document.getElementById('user-search').value.trim();
            if (!userId) {
                showMessage('⚠️ 请输入用户ID', 'error');
                return;
            }

            const container = document.getElementById('search-container');
            container.innerHTML = '<div class="loading">搜索中...</div>';

            fetch(`/api/admin/stats/user/${userId}/records`, {
                headers: { 'x-admin-token': adminToken }
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    container.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                    return;
                }
                
                if (!data.records || data.records.length === 0) {
                    container.innerHTML = '<div class="loading">暂无记录</div>';
                    showMessage(`⚠️ 用户 ${userId} 暂无中奖记录`);
                    return;
                }

                let html = '<table><thead><tr><th>用户ID</th><th>奖品名称</th><th>奖品值</th><th>中奖时间</th></tr></thead><tbody>';
                data.records.forEach(r => {
                    html += `<tr>
                        <td>${r.userId}</td>
                        <td>${r.reward.name}</td>
                        <td>${r.reward.value}</td>
                        <td>${new Date(r.timestamp).toLocaleString('zh-CN')}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
                showMessage(`✅ 找到 ${data.records.length} 条记录`);
            })
            .catch(err => {
                container.innerHTML = '<div class="error">❌ 查询失败</div>';
                showMessage('❌ 查询失败: ' + err, 'error');
            });
        }

        function exportData() {
            showMessage('📥 导出功能即将推出', 'success');
        }

        function logout() {
            if (confirm('确定要退出登录吗?')) {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUser');
                window.location.href = 'index.html';
            }
        }

        window.onload = refreshStats;
    </script>
<script src="nav.js"></script>
</body>
</html>
