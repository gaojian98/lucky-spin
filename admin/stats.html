<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 数据统计</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topbar h1 { font-size: 1.2rem; }
    .topbar .nav a {
      color: white;
      text-decoration: none;
      margin-left: 14px;
      font-size: 0.88rem;
      opacity: 0.85;
    }
    .topbar .nav a:hover { opacity: 1; }
    .topbar .logout {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 14px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .stat-card .label { color: #888; font-size: 0.85rem; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: bold; color: #333; }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #444; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
    button { padding: 7px 16px; margin: 2px; cursor: pointer; border: none; border-radius: 6px; font-size: 0.85rem; }
    .btn-primary { background: #667eea; color: white; }
    input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    .no-data { text-align: center; color: #aaa; padding: 24px; }
    .search-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .pagination { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
    .pagination button { padding: 6px 12px; background: #f0f4ff; color: #667eea; border: 1px solid #c5d3f7; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination span { font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">仪表板</a>
      <a href="/admin/users.html">用户管理</a>
      <a href="/admin/applications.html">申请审核</a>
      <a href="/admin/managers.html">管理员</a>
      <a href="/admin/config.html">配置</a>
      <a href="/admin/stats.html">统计</a>
      <a href="/admin/payment-accounts.html">收款账号</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">👥 用户总数</div>
        <div class="value" id="totalUsers">-</div>
      </div>
      <div class="stat-card">
        <div class="label">🎰 转盘总次数</div>
        <div class="value" id="totalSpins">-</div>
      </div>
      <div class="stat-card">
        <div class="label">🏆 总赢取积分</div>
        <div class="value" id="totalWinnings">-</div>
      </div>
      <div class="stat-card">
        <div class="label">💰 已批准充值</div>
        <div class="value" id="totalRecharge">-</div>
      </div>
      <div class="stat-card">
        <div class="label">📋 中奖记录数</div>
        <div class="value" id="totalWinRecords">-</div>
      </div>
      <div class="stat-card">
        <div class="label">⏳ 待审充值</div>
        <div class="value" id="pendingRecharge" style="color:#856404;">-</div>
      </div>
    </div>

    <div class="section">
      <h2>🏆 中奖记录</h2>
      <div id="recordsList"><p class="no-data">加载中...</p></div>
      <div class="pagination" id="pagination" style="display:none;">
        <button id="prevBtn" onclick="changePage(-1)" disabled>◀ 上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextBtn" onclick="changePage(1)">下一页 ▶</button>
      </div>
    </div>

    <div class="section">
      <h2>🔍 查询用户中奖记录</h2>
      <div class="search-row">
        <input type="text" id="searchUserId" placeholder="输入用户名" style="width:200px;" onkeydown="if(event.key==='Enter')searchUserRecords()">
        <button class="btn-primary" onclick="searchUserRecords()">🔍 查询</button>
      </div>
      <div id="userRecordsList"></div>
    </div>

  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) {
      window.location.href = '/admin';
    }

    function logout() {
      sessionStorage.removeItem('adminUser');
      window.location.href = '/admin';
    }

    let currentPage = 1;
    let totalPages = 1;

    function loadSummary() {
      fetch('/api/admin/stats/summary', {
        headers: { 'x-admin-token': adminData.token }
      })
      .then(r => r.json())
      .then(d => {
        if (d.error) return;
        document.getElementById('totalUsers').textContent = (d.totalUsers || 0).toLocaleString();
        document.getElementById('totalSpins').textContent = (d.totalSpins || 0).toLocaleString();
        document.getElementById('totalWinnings').textContent = (d.totalWinnings || 0).toLocaleString();
        document.getElementById('totalRecharge').textContent = (d.totalRecharge || 0).toLocaleString();
        document.getElementById('totalWinRecords').textContent = (d.totalWinRecords || 0).toLocaleString();
        document.getElementById('pendingRecharge').textContent = (d.pendingRecharge || 0).toLocaleString();
      });
    }

    function loadRecords(page) {
      currentPage = page || 1;
      document.getElementById('recordsList').innerHTML = '<p class="no-data">加载中...</p>';

      fetch('/api/admin/stats/records?page=' + currentPage + '&limit=20', {
        headers: { 'x-admin-token': adminData.token }
      })
      .then(r => r.json())
      .then(d => {
        if (d.error) {
          document.getElementById('recordsList').innerHTML = '<p class="no-data" style="color:red;">❌ ' + d.error + '</p>';
          return;
        }
        if (!d.records || d.records.length === 0) {
          document.getElementById('recordsList').innerHTML = '<p class="no-data">暂无中奖记录</p>';
          document.getElementById('pagination').style.display = 'none';
          return;
        }
        totalPages = Math.ceil(d.total / d.limit) || 1;
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('pageInfo').textContent = '第 ' + currentPage + ' / ' + totalPages + ' 页（共 ' + d.total + ' 条）';
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;

        let html = '<table><tr><th>ID</th><th>用户</th><th>奖品</th><th>类型</th><th>价值</th><th>时间</th></tr>';
        d.records.forEach(r => {
          html += `<tr>
            <td>${r.id}</td>
            <td><strong>${r.userId}</strong></td>
            <td>${r.reward.icon || ''} ${r.reward.name}</td>
            <td>${r.reward.type}</td>
            <td>${(r.reward.value || 0).toLocaleString()}</td>
            <td>${new Date(r.timestamp).toLocaleString('zh-CN')}</td>
          </tr>`;
        });
        html += '</table>';
        document.getElementById('recordsList').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('recordsList').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接到服务器</p>';
      });
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage < 1 || newPage > totalPages) return;
      loadRecords(newPage);
    }

    function searchUserRecords() {
      const userId = document.getElementById('searchUserId').value.trim();
      if (!userId) { alert('❗ 请输入用户名'); return; }

      document.getElementById('userRecordsList').innerHTML = '<p class="no-data">加载中...</p>';
      fetch('/api/admin/stats/user/' + encodeURIComponent(userId) + '/records', {
        headers: { 'x-admin-token': adminData.token }
      })
      .then(r => r.json())
      .then(d => {
        if (d.error) {
          document.getElementById('userRecordsList').innerHTML = '<p class="no-data" style="color:red;">❌ ' + d.error + '</p>';
          return;
        }
        if (!d.records || d.records.length === 0) {
          document.getElementById('userRecordsList').innerHTML = '<p class="no-data">该用户暂无中奖记录</p>';
          return;
        }
        let html = '<p style="color:#666;margin-bottom:10px;">用户 <strong>' + d.userId + '</strong> 共 ' + d.total + ' 条记录</p>';
        html += '<table><tr><th>ID</th><th>奖品</th><th>类型</th><th>价值</th><th>时间</th></tr>';
        d.records.forEach(r => {
          html += `<tr>
            <td>${r.id}</td>
            <td>${r.reward.icon || ''} ${r.reward.name}</td>
            <td>${r.reward.type}</td>
            <td>${(r.reward.value || 0).toLocaleString()}</td>
            <td>${new Date(r.timestamp).toLocaleString('zh-CN')}</td>
          </tr>`;
        });
        html += '</table>';
        document.getElementById('userRecordsList').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('userRecordsList').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接到服务器</p>';
      });
    }

    loadSummary();
    loadRecords(1);
    const summaryInterval = setInterval(loadSummary, 10000);
    window.addEventListener('beforeunload', () => clearInterval(summaryInterval));
  </script>
</body>
</html>
