<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 系统配置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topbar h1 { font-size: 1.2rem; }
    .topbar .nav a {
      color: white;
      text-decoration: none;
      margin-left: 14px;
      font-size: 0.88rem;
      opacity: 0.85;
    }
    .topbar .nav a:hover { opacity: 1; }
    .topbar .logout {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 14px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #444; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
    input[type="text"], input[type="number"], textarea, select {
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 100%;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus { border-color: #667eea; }
    textarea { resize: vertical; min-height: 100px; }
    button { padding: 7px 16px; margin: 2px; cursor: pointer; border: none; border-radius: 6px; font-size: 0.85rem; }
    .btn-primary { background: #667eea; color: white; }
    .btn-success { background: #28a745; color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .no-data { text-align: center; color: #aaa; padding: 24px; }
    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-top: 12px;
      display: none;
    }
    .msg-success { background: #d4edda; color: #155724; }
    .msg-error { background: #f8d7da; color: #721c24; }
    .reward-row td input { width: 100%; }
    .form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">仪表板</a>
      <a href="/admin/users.html">用户管理</a>
      <a href="/admin/applications.html">申请审核</a>
      <a href="/admin/managers.html">管理员</a>
      <a href="/admin/config.html">配置</a>
      <a href="/admin/stats.html">统计</a>
      <a href="/admin/payment-accounts.html">收款账号</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">

    <div class="section">
      <h2>🎁 奖品配置</h2>
      <div id="rewardsTable"><p class="no-data">加载中...</p></div>
      <div style="margin-top:12px;">
        <button class="btn-success" onclick="saveRewards()">💾 保存奖品配置</button>
      </div>
      <div class="msg" id="rewardsMsg"></div>
    </div>

    <div class="section">
      <h2>📝 游戏说明</h2>
      <textarea id="gameDesc" rows="4" placeholder="游戏说明内容..."></textarea>
      <div style="margin-top:12px;">
        <button class="btn-primary" onclick="saveDescription()">💾 保存游戏说明</button>
      </div>
      <div class="msg" id="descMsg"></div>
    </div>

  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) {
      window.location.href = '/admin';
    }

    function logout() {
      sessionStorage.removeItem('adminUser');
      window.location.href = '/admin';
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.className = 'msg msg-' + type;
      el.textContent = text;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    let currentRewards = [];

    function loadRewards() {
      fetch('/api/admin/config/rewards', {
        headers: { 'x-admin-token': adminData.token }
      })
      .then(r => r.json())
      .then(d => {
        if (d.error) {
          document.getElementById('rewardsTable').innerHTML = '<p class="no-data" style="color:red;">❌ ' + d.error + '</p>';
          return;
        }
        currentRewards = d.rewards;
        renderRewardsTable();
      })
      .catch(() => {
        document.getElementById('rewardsTable').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接到服务器</p>';
      });
    }

    function renderRewardsTable() {
      let html = '<table><tr><th>图标</th><th>名称</th><th>类型</th><th>价值</th><th>权重</th><th>稀有度</th></tr>';
      currentRewards.forEach((r, i) => {
        html += `<tr class="reward-row">
          <td><input type="text" value="${r.icon || ''}" onchange="updateReward(${i},'icon',this.value)" style="width:60px;text-align:center;"></td>
          <td><input type="text" value="${r.name || ''}" onchange="updateReward(${i},'name',this.value)"></td>
          <td>
            <select onchange="updateReward(${i},'type',this.value)">
              <option value="points" ${r.type==='points'?'selected':''}>积分</option>
              <option value="cash" ${r.type==='cash'?'selected':''}>现金</option>
              <option value="iphone" ${r.type==='iphone'?'selected':''}>iPhone</option>
              <option value="airpods" ${r.type==='airpods'?'selected':''}>AirPods</option>
            </select>
          </td>
          <td><input type="number" value="${r.value || 0}" min="0" onchange="updateReward(${i},'value',parseFloat(this.value))"></td>
          <td><input type="number" value="${r.weight || 1}" min="0.01" step="0.01" onchange="updateReward(${i},'weight',parseFloat(this.value))"></td>
          <td>
            <select onchange="updateReward(${i},'rarity',this.value)">
              <option value="common" ${r.rarity==='common'?'selected':''}>普通</option>
              <option value="rare" ${r.rarity==='rare'?'selected':''}>稀有</option>
              <option value="epic" ${r.rarity==='epic'?'selected':''}>史诗</option>
              <option value="legendary" ${r.rarity==='legendary'?'selected':''}>传说</option>
            </select>
          </td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('rewardsTable').innerHTML = html;
    }

    function updateReward(index, field, value) {
      currentRewards[index][field] = value;
    }

    function saveRewards() {
      fetch('/api/admin/config/rewards', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminData.token },
        body: JSON.stringify({ rewards: currentRewards })
      })
      .then(r => r.json())
      .then(d => {
        showMsg('rewardsMsg', d.error ? '❌ ' + d.error : '✅ ' + d.message, d.error ? 'error' : 'success');
      })
      .catch(() => showMsg('rewardsMsg', '❌ 无法连接到服务器', 'error'));
    }

    function loadDescription() {
      fetch('/api/admin/config/description', {
        headers: { 'x-admin-token': adminData.token }
      })
      .then(r => r.json())
      .then(d => {
        if (!d.error) {
          document.getElementById('gameDesc').value = d.description || '';
        }
      });
    }

    function saveDescription() {
      const description = document.getElementById('gameDesc').value.trim();
      if (!description) { showMsg('descMsg', '❗ 说明内容不能为空', 'error'); return; }

      fetch('/api/admin/config/description', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminData.token },
        body: JSON.stringify({ description })
      })
      .then(r => r.json())
      .then(d => {
        showMsg('descMsg', d.error ? '❌ ' + d.error : '✅ ' + d.message, d.error ? 'error' : 'success');
      })
      .catch(() => showMsg('descMsg', '❌ 无法连接到服务器', 'error'));
    }

    loadRewards();
    loadDescription();
  </script>
</body>
</html>
