<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 游戏配置</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">🏠 仪表板</a>
      <a href="/admin/users.html">👥 用户管理</a>
      <a href="/admin/managers.html">👤 管理员管理</a>
      <a href="/admin/config.html" class="active">🎡 游戏配置</a>
      <a href="/admin/stats.html">📊 数据统计</a>
      <a href="/admin/payment-accounts.html">💳 收款账号</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">
    <!-- 奖品配置 -->
    <div class="section">
      <h2>🏆 奖品配置</h2>
      <div id="alertRewards" class="alert"></div>
      <div id="rewardsList"><p class="no-data">加载中...</p></div>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-success" onclick="addRewardRow()">➕ 添加奖品</button>
        <button class="btn-primary" onclick="saveRewards()">💾 保存奖品配置</button>
      </div>
    </div>

    <!-- 游戏说明 -->
    <div class="section">
      <h2>📝 游戏说明</h2>
      <div id="alertDesc" class="alert"></div>
      <div class="form-group" style="margin-bottom:14px;">
        <label>游戏规则说明（实时更新到用户端）</label>
        <textarea id="gameDesc" style="width:100%;height:120px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:0.9rem;resize:vertical;" placeholder="请输入游戏说明内容..."></textarea>
      </div>
      <button class="btn-primary" onclick="saveDescription()">💾 保存说明</button>
    </div>
  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) window.location.href = '/admin';
    const TOKEN = adminData ? adminData.token : '';
    let rewards = [];
    let rewardIdCounter = 100;

    function logout() { sessionStorage.removeItem('adminUser'); window.location.href = '/admin'; }

    function api(url, opts={}) {
      return fetch(url, { ...opts, headers: { 'x-admin-token': TOKEN, 'Content-Type': 'application/json', ...(opts.headers||{}) } }).then(r => r.json());
    }

    function showAlert(id, msg, type='success') {
      const el = document.getElementById(id);
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display='none'; }, 3500);
    }

    const rarityOptions = ['legendary','epic','rare','common'];
    const rarityLabels = { legendary:'传奇', epic:'史诗', rare:'稀有', common:'普通' };

    function renderRewards() {
      if (!rewards.length) { document.getElementById('rewardsList').innerHTML = '<p class="no-data">暂无奖品，请添加</p>'; return; }
      let html = `<div style="background:#f4f4f4;border-radius:8px;padding:10px 8px;margin-bottom:6px;display:grid;grid-template-columns:40px 1fr 100px 80px 80px 90px 70px 60px;gap:8px;font-size:0.8rem;font-weight:600;color:#666;">
        <span>图标</span><span>名称</span><span>类型</span><span>价值</span><span>权重</span><span>稀有度</span><span>段位</span><span>删除</span>
      </div>`;
      rewards.forEach((r, idx) => {
        const rarityOpts = rarityOptions.map(v => `<option value="${v}" ${r.rarity===v?'selected':''}>${rarityLabels[v]}</option>`).join('');
        html += `<div style="display:grid;grid-template-columns:40px 1fr 100px 80px 80px 90px 70px 60px;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:#f9f9f9;border-radius:8px;">
          <input type="text" value="${esc(r.icon||'')}" oninput="updateReward(${idx},'icon',this.value)" style="padding:5px;border:1px solid #ddd;border-radius:4px;font-size:1.2rem;text-align:center;" maxlength="4">
          <input type="text" value="${esc(r.name||'')}" oninput="updateReward(${idx},'name',this.value)" style="padding:5px;border:1px solid #ddd;border-radius:4px;font-size:0.88rem;">
          <input type="text" value="${esc(r.type||'')}" oninput="updateReward(${idx},'type',this.value)" style="padding:5px;border:1px solid #ddd;border-radius:4px;font-size:0.88rem;">
          <input type="number" value="${r.value||0}" oninput="updateReward(${idx},'value',+this.value)" style="padding:5px;border:1px solid #ddd;border-radius:4px;font-size:0.88rem;">
          <input type="number" step="0.01" value="${r.weight||0}" oninput="updateReward(${idx},'weight',+this.value)" style="padding:5px;border:1px solid #ddd;border-radius:4px;font-size:0.88rem;">
          <select onchange="updateReward(${idx},'rarity',this.value)" style="padding:5px;border:1px solid #ddd;border-radius:4px;font-size:0.83rem;">${rarityOpts}</select>
          <input type="number" value="${r.segment??idx}" oninput="updateReward(${idx},'segment',+this.value)" style="padding:5px;border:1px solid #ddd;border-radius:4px;font-size:0.88rem;">
          <button class="btn-danger btn-sm" onclick="removeReward(${idx})" style="margin:0;">删除</button>
        </div>`;
      });
      document.getElementById('rewardsList').innerHTML = html;
    }

    function updateReward(idx, field, val) { rewards[idx][field] = val; }
    function removeReward(idx) { if (confirm('确认删除该奖品吗？')) { rewards.splice(idx, 1); renderRewards(); } }
    function addRewardRow() {
      rewards.push({ id: rewardIdCounter++, type: 'points', name: '新奖品', value: 0, weight: 1, rarity: 'common', icon: '🎁', segment: rewards.length });
      renderRewards();
    }

    function saveRewards() {
      for (let r of rewards) {
        if (!r.name || !String(r.name).trim() || !r.type || !String(r.type).trim()) { showAlert('alertRewards', '❌ 奖品名称和类型不能为空', 'danger'); return; }
        if (r.weight <= 0) { showAlert('alertRewards', '❌ 权重必须大于0', 'danger'); return; }
      }
      api('/api/admin/config/rewards', { method: 'PUT', body: JSON.stringify({ rewards }) }).then(d => {
        if (d.error) showAlert('alertRewards', '❌ ' + d.error, 'danger');
        else showAlert('alertRewards', '✅ ' + d.message, 'success');
      });
    }

    function loadDescription() {
      api('/api/admin/config/description').then(d => {
        if (!d.error) document.getElementById('gameDesc').value = d.description || '';
      });
    }

    function saveDescription() {
      const description = document.getElementById('gameDesc').value.trim();
      if (!description) { showAlert('alertDesc', '❌ 说明内容不能为空', 'danger'); return; }
      api('/api/admin/config/description', { method: 'PUT', body: JSON.stringify({ description }) }).then(d => {
        if (d.error) showAlert('alertDesc', '❌ ' + d.error, 'danger');
        else showAlert('alertDesc', '✅ ' + d.message, 'success');
      });
    }

    function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    api('/api/admin/config/rewards').then(d => {
      if (!d.error) { rewards = d.rewards || []; renderRewards(); }
    });
    loadDescription();
  </script>
</body>
</html>
