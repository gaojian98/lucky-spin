<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 管理员列表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topbar h1 { font-size: 1.2rem; }
    .topbar .nav a {
      color: white;
      text-decoration: none;
      margin-left: 14px;
      font-size: 0.88rem;
      opacity: 0.85;
    }
    .topbar .nav a:hover { opacity: 1; }
    .topbar .logout {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 14px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 24px;
    }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #444; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: bold;
    }
    .badge-super { background: #ffeaa7; color: #6c5600; }
    .badge-manager { background: #d6eaf8; color: #1a5276; }
    button { padding: 6px 14px; margin: 2px; cursor: pointer; border: none; border-radius: 6px; font-size: 0.85rem; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-warning { background: #fd7e14; color: white; }
    input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    .no-data { text-align: center; color: #aaa; padding: 24px; }
    .notice {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 12px 16px;
      color: #856404;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .reset-result {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      border-radius: 8px;
      padding: 12px 16px;
      color: #155724;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">仪表板</a>
      <a href="/admin/users.html">用户管理</a>
      <a href="/admin/applications.html">申请审核</a>
      <a href="/admin/managers.html">管理员</a>
      <a href="/admin/config.html">配置</a>
      <a href="/admin/stats.html">统计</a>
      <a href="/admin/payment-accounts.html">收款账号</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">
    <div id="noPermMsg" class="notice" style="display:none;">⚠️ 此页面仅限超级管理员访问。</div>

    <div class="section" id="mainSection">
      <h2>👥 管理员列表</h2>
      <div id="managersList"><p class="no-data">加载中...</p></div>
    </div>

    <div class="section" id="resetSection">
      <h2>🔑 重置管理员密码</h2>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="resetUsername" placeholder="管理员用户名" style="width:180px;">
        <input type="password" id="newPassword" placeholder="新密码（留空自动生成）" style="width:220px;">
        <button style="background:#667eea;color:white;" onclick="resetPassword()">🔑 重置密码</button>
      </div>
      <div class="reset-result" id="resetResult"></div>
    </div>
  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) {
      window.location.href = '/admin';
    }

    function logout() {
      sessionStorage.removeItem('adminUser');
      window.location.href = '/admin';
    }

    function loadManagers() {
      if (adminData.role !== 'super') {
        document.getElementById('noPermMsg').style.display = 'block';
        document.getElementById('mainSection').style.display = 'none';
        document.getElementById('resetSection').style.display = 'none';
        return;
      }

      fetch('/api/admin/managers', {
        headers: { 'x-admin-token': adminData.token }
      })
      .then(r => r.json())
      .then(d => {
        if (d.error) {
          document.getElementById('managersList').innerHTML = '<p class="no-data" style="color:red;">❌ ' + d.error + '</p>';
          return;
        }
        const managers = d.managers;
        if (!managers || managers.length === 0) {
          document.getElementById('managersList').innerHTML = '<p class="no-data">暂无管理员</p>';
          return;
        }
        let html = '<table><tr><th>用户名</th><th>角色</th><th>创建时间</th><th>操作</th></tr>';
        managers.forEach(m => {
          const roleMap = {
            super: ['badge-super', '👑 超级管理员'],
            manager: ['badge-manager', '🛡️ 管理员']
          };
          const [cls, txt] = roleMap[m.role] || ['', m.role];
          html += `<tr>
            <td><strong>${m.username}</strong></td>
            <td><span class="badge ${cls}">${txt}</span></td>
            <td>${m.createdAt ? new Date(m.createdAt).toLocaleString('zh-CN') : '-'}</td>
            <td>`;
          if (m.username !== adminData.username) {
            html += `<button class="btn-danger" onclick="deleteManager('${m.username}')">🗑️ 删除</button>`;
          } else {
            html += '<span style="color:#aaa;">当前账号</span>';
          }
          html += '</td></tr>';
        });
        html += '</table>';
        document.getElementById('managersList').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('managersList').innerHTML = '<p class="no-data" style="color:red;">❌ 无法连接到服务器</p>';
      });
    }

    function deleteManager(username) {
      if (!confirm('确认删除管理员 "' + username + '"？此操作不可恢复。')) return;
      fetch('/api/admin/managers/' + encodeURIComponent(username), {
        method: 'DELETE',
        headers: { 'x-admin-token': adminData.token }
      })
      .then(r => r.json())
      .then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadManagers();
      });
    }

    function resetPassword() {
      const username = document.getElementById('resetUsername').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      if (!username) { alert('❗ 请输入管理员用户名'); return; }

      fetch('/api/admin/managers/' + encodeURIComponent(username) + '/reset-password', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminData.token },
        body: JSON.stringify({ newPassword: newPassword || undefined })
      })
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById('resetResult');
        if (d.error) {
          el.style.background = '#f8d7da';
          el.style.borderColor = '#f5c6cb';
          el.style.color = '#721c24';
          el.textContent = '❌ ' + d.error;
        } else {
          el.style.background = '#d4edda';
          el.style.borderColor = '#c3e6cb';
          el.style.color = '#155724';
          el.textContent = '✅ ' + d.message + '  新密码：' + d.newPassword;
          document.getElementById('resetUsername').value = '';
          document.getElementById('newPassword').value = '';
        }
        el.style.display = 'block';
      });
    }

    loadManagers();
  </script>
</body>
</html>
