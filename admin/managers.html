<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 管理员管理</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
  <div class="topbar">
    <h1>🎉 幸运转盘 - 管理后台</h1>
    <div class="nav">
      <a href="/admin/dashboard.html">🏠 仪表板</a>
      <a href="/admin/users.html">👥 用户管理</a>
      <a href="/admin/managers.html" class="active">👤 管理员管理</a>
      <a href="/admin/config.html">🎡 游戏配置</a>
      <a href="/admin/stats.html">📊 数据统计</a>
      <a href="/admin/payment-accounts.html">💳 收款账号</a>
      <button class="logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('applications')">📋 申请列表</button>
      <button class="tab-btn" onclick="switchTab('managers')">👤 管理员列表</button>
    </div>

    <!-- 申请列表 -->
    <div class="tab-content active" id="tab-applications">
      <div class="section">
        <h2>📋 管理员申请列表</h2>
        <div class="toolbar">
          <select id="appFilter" onchange="renderApplications()">
            <option value="">全部</option>
            <option value="pending">待审核</option>
            <option value="approved">已批准</option>
            <option value="rejected">已拒绝</option>
          </select>
          <button class="btn-primary btn-sm" onclick="loadApplications()">刷新</button>
        </div>
        <div id="appList"><p class="no-data">加载中...</p></div>
      </div>
    </div>

    <!-- 管理员列表 -->
    <div class="tab-content" id="tab-managers">
      <div class="section">
        <h2>👤 管理员账号列表</h2>
        <div class="toolbar">
          <button class="btn-primary btn-sm" onclick="loadManagers()">刷新</button>
        </div>
        <div id="managerList"><p class="no-data">加载中...</p></div>
      </div>
    </div>
  </div>

  <!-- 拒绝申请弹窗 -->
  <div class="modal-overlay" id="rejectModal">
    <div class="modal">
      <h3>❌ 拒绝申请</h3>
      <div class="form-group">
        <label>申请人：<strong id="rejectAppUser"></strong></label>
      </div>
      <div class="form-group">
        <label>拒绝原因</label>
        <textarea id="rejectReason" placeholder="请输入拒绝原因（可选）"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('rejectModal')">取消</button>
        <button class="btn-danger" onclick="confirmReject()">确认拒绝</button>
      </div>
    </div>
  </div>

  <!-- 重置管理员密码弹窗 -->
  <div class="modal-overlay" id="resetMgrPwModal">
    <div class="modal">
      <h3>🔑 重置管理员密码</h3>
      <div class="form-group">
        <label>管理员：<strong id="resetMgrUser"></strong></label>
      </div>
      <div class="form-group">
        <label>新密码（留空则自动生成）</label>
        <input type="text" id="resetMgrPw" placeholder="留空则生成随机密码">
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('resetMgrPwModal')">取消</button>
        <button class="btn-primary" onclick="confirmResetMgrPw()">确认重置</button>
      </div>
    </div>
  </div>

  <script>
    const adminData = JSON.parse(sessionStorage.getItem('adminUser') || 'null');
    if (!adminData) window.location.href = '/admin';
    const TOKEN = adminData ? adminData.token : '';
    let allApplications = [];
    let currentAction = {};

    function logout() { sessionStorage.removeItem('adminUser'); window.location.href = '/admin'; }

    function api(url, opts={}) {
      return fetch(url, { ...opts, headers: { 'x-admin-token': TOKEN, 'Content-Type': 'application/json', ...(opts.headers||{}) } }).then(r => r.json());
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['applications','managers'][i] === tab));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
      if (tab === 'applications') loadApplications();
      else loadManagers();
    }

    function loadApplications() {
      api('/api/admin/applications').then(d => {
        if (d.error) { document.getElementById('appList').innerHTML = '<p class="no-data" style="color:red;">❌ ' + d.error + '</p>'; return; }
        allApplications = d.applications || [];
        renderApplications();
      });
    }

    function renderApplications() {
      const filter = document.getElementById('appFilter').value;
      const list = filter ? allApplications.filter(a => a.status === filter) : allApplications;
      if (list.length === 0) { document.getElementById('appList').innerHTML = '<p class="no-data">暂无申请记录</p>'; return; }
      const statusMap = { pending: ['badge-pending','⏳ 待审核'], approved: ['badge-approved','✅ 已批准'], rejected: ['badge-rejected','❌ 已拒绝'] };
      let html = '<table><thead><tr><th>ID</th><th>申请用户名</th><th>申请理由</th><th>状态</th><th>申请时间</th><th>处理人</th><th>处理时间</th><th>操作</th></tr></thead><tbody>';
      list.forEach(a => {
        const [cls, txt] = statusMap[a.status] || ['',''];
        html += `<tr>
          <td>${a.id}</td>
          <td><strong>${esc(a.username)}</strong></td>
          <td>${esc(a.reason||'-')}</td>
          <td><span class="badge ${cls}">${txt}</span></td>
          <td>${new Date(a.createdAt).toLocaleString('zh-CN')}</td>
          <td>${a.processedBy||'-'}</td>
          <td>${a.processedAt ? new Date(a.processedAt).toLocaleString('zh-CN') : '-'}</td>
          <td>`;
        if (a.status === 'pending') {
          html += `<button class="btn-success btn-sm" onclick="approveApplication(${a.id})">✅ 批准</button>`;
          html += `<button class="btn-danger btn-sm" onclick="openRejectModal(${a.id},'${esc(a.username)}')">❌ 拒绝</button>`;
        } else { html += '<span style="color:#aaa;font-size:0.82rem;">已处理</span>'; }
        html += '</td></tr>';
      });
      html += '</tbody></table>';
      document.getElementById('appList').innerHTML = html;
    }

    function approveApplication(id) {
      if (!confirm('确认批准该申请并创建管理员账号吗？')) return;
      api('/api/admin/applications/' + id + '/approve', { method: 'PATCH' }).then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadApplications();
      });
    }

    function openRejectModal(id, username) {
      currentAction.rejectId = id;
      document.getElementById('rejectAppUser').textContent = username;
      document.getElementById('rejectReason').value = '';
      document.getElementById('rejectModal').classList.add('show');
    }
    function confirmReject() {
      api('/api/admin/applications/' + currentAction.rejectId + '/reject', { method: 'PATCH', body: JSON.stringify({ reason: document.getElementById('rejectReason').value }) }).then(d => {
        closeModal('rejectModal');
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadApplications();
      });
    }

    function loadManagers() {
      api('/api/admin/managers').then(d => {
        if (d.error) { document.getElementById('managerList').innerHTML = '<p class="no-data" style="color:red;">❌ ' + d.error + '</p>'; return; }
        const list = d.managers || [];
        if (list.length === 0) { document.getElementById('managerList').innerHTML = '<p class="no-data">暂无管理员</p>'; return; }
        let html = '<table><thead><tr><th>用户名</th><th>角色</th><th>操作</th></tr></thead><tbody>';
        list.forEach(m => {
          const roleLabel = m.role === 'super' ? '⭐ 超级管理员' : '👤 管理员';
          html += `<tr>
            <td><strong>${esc(m.username)}</strong></td>
            <td>${roleLabel}</td>
            <td>
              <button class="btn-info btn-sm js-reset-mgr-pw" data-username="${esc(m.username)}">🔑 重置密码</button>
              ${m.role !== 'super' ? `<button class="btn-danger btn-sm js-delete-mgr" data-username="${esc(m.username)}">🗑️ 删除</button>` : ''}
            </td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('managerList').innerHTML = html;
        document.querySelectorAll('.js-reset-mgr-pw').forEach(btn => {
          btn.addEventListener('click', () => openResetMgrPwModal(btn.dataset.username));
        });
        document.querySelectorAll('.js-delete-mgr').forEach(btn => {
          btn.addEventListener('click', () => deleteManager(btn.dataset.username));
        });
      });
    }

    function deleteManager(username) {
      if (!confirm('确认删除管理员 "' + username + '" 吗？')) return;
      api('/api/admin/managers/' + encodeURIComponent(username), { method: 'DELETE' }).then(d => {
        alert(d.error ? '❌ ' + d.error : '✅ ' + d.message);
        loadManagers();
      });
    }

    function openResetMgrPwModal(username) {
      currentAction.resetMgrUser = username;
      document.getElementById('resetMgrUser').textContent = username;
      document.getElementById('resetMgrPw').value = '';
      document.getElementById('resetMgrPwModal').classList.add('show');
    }
    function confirmResetMgrPw() {
      const newPassword = document.getElementById('resetMgrPw').value.trim();
      api('/api/admin/managers/' + encodeURIComponent(currentAction.resetMgrUser) + '/reset-password', { method: 'PATCH', body: JSON.stringify({ newPassword: newPassword||undefined }) }).then(d => {
        closeModal('resetMgrPwModal');
        if (d.error) alert('❌ ' + d.error); else alert('✅ 密码已重置\n新密码：' + d.newPassword);
      });
    }

    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    document.querySelectorAll('.modal-overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); }));

    function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    loadApplications();
  </script>
</body>
</html>
