<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运转盘 - 管理后台登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card h1 {
            text-align: center;
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 8px;
        }
        .login-card p.subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            display: none;
            background: #f8d7da;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎉 管理后台</h1>
        <p class="subtitle">幸运转盘 - 后台管理系统</p>
        
        <div class="form-group">
            <label>管理员账号</label>
            <input type="text" id="username" placeholder="请输入账号" value="admin">
        </div>
        
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" value="admin123">
        </div>
        
        <button class="btn-login" id="loginBtn" onclick="doLogin()">登 录</button>
        <p class="error-msg" id="errorMsg"></p>
    </div>

    <script>
        // 防止加载导航菜单
        // 这是登录页，不需要 nav.js
        
        function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❗ 请输入账号和密码';
                return;
            }
            
            btn.disabled = true;
            
            fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.token) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', data.username);
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = '✅ 登录成功';
                    errorMsg.style.background = '#d4edda';
                    errorMsg.style.color = '#155724';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = '❌ ' + (data.error || '登录失败');
                    btn.disabled = false;
                }
            })
            .catch(error => {
                errorMsg.style.display = 'block';
                errorMsg.textContent = '❌ 无法连接到服务器';
                btn.disabled = false;
            });
        }
        
        // 回车登录
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
        
        // 检查是否已登录，已登录则跳转
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
