<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 管理后台登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #333;
      margin-bottom: 8px;
    }
    .login-card p.subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid #eee;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      font-size: 0.95rem;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
      font-weight: bold;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #555;
      font-size: 0.9rem;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: Arial, sans-serif;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #667eea;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .msg {
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
    .msg.error { color: #dc3545; }
    .msg.success { color: #28a745; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🎉 管理后台</h1>
    <p class="subtitle">幸运转盘 - 后台管理系统</p>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">登 录</button>
      <button class="tab-btn" onclick="switchTab('apply')">申请管理员</button>
    </div>

    <!-- 登录标签页 -->
    <div class="tab-content active" id="tab-login">
      <div class="form-group">
        <label>管理员账号</label>
        <input type="text" id="username" placeholder="请输入账号" autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-submit" onclick="login()">登 录</button>
      <p class="msg error" id="loginMsg"></p>
    </div>

    <!-- 申请管理员标签页 -->
    <div class="tab-content" id="tab-apply">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="applyUsername" placeholder="请输入申请账号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="applyPassword" placeholder="请设置密码">
      </div>
      <div class="form-group">
        <label>申请理由</label>
        <textarea id="applyReason" placeholder="请简述申请成为管理员的理由"></textarea>
      </div>
      <button class="btn-submit" onclick="applyManager()">提 交 申 请</button>
      <p class="msg" id="applyMsg"></p>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'apply' && i === 1));
      });
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-apply').classList.toggle('active', tab === 'apply');
    }

    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('loginMsg');

      if (!username || !password) {
        msg.style.display = 'block';
        msg.textContent = '❗ 请输入账号和密码';
        return;
      }

      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          msg.style.display = 'block';
          msg.textContent = '❌ ' + data.error;
        } else {
          sessionStorage.setItem('adminUser', JSON.stringify(data));
          window.location.href = '/admin/dashboard.html';
        }
      })
      .catch(() => {
        msg.style.display = 'block';
        msg.textContent = '❌ 无法连接到服务器';
      });
    }

    function applyManager() {
      const username = document.getElementById('applyUsername').value.trim();
      const password = document.getElementById('applyPassword').value;
      const reason = document.getElementById('applyReason').value.trim();
      const msg = document.getElementById('applyMsg');

      if (!username || !password) {
        msg.className = 'msg error';
        msg.style.display = 'block';
        msg.textContent = '❗ 请输入用户名和密码';
        return;
      }

      fetch('/api/admin/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, reason })
      })
      .then(r => r.json())
      .then(data => {
        msg.style.display = 'block';
        if (data.error) {
          msg.className = 'msg error';
          msg.textContent = '❌ ' + data.error;
        } else {
          msg.className = 'msg success';
          msg.textContent = data.message;
          document.getElementById('applyUsername').value = '';
          document.getElementById('applyPassword').value = '';
          document.getElementById('applyReason').value = '';
        }
      })
      .catch(() => {
        msg.className = 'msg error';
        msg.style.display = 'block';
        msg.textContent = '❌ 无法连接到服务器';
      });
    }
  </script>
</body>
</html>
