<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸运转盘 - 管理后台登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #333;
      margin-bottom: 8px;
    }
    .login-card p.subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid #eee;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s;
    }
    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
      font-weight: bold;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #555;
      font-size: 0.9rem;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: Arial, sans-serif;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: #667eea;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .msg {
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      display: none;
      padding: 8px;
      border-radius: 6px;
    }
    .msg.error { color: #721c24; background: #f8d7da; display: block; }
    .msg.success { color: #155724; background: #d4edda; display: block; }
    .msg.info { color: #856404; background: #fff3cd; display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🎉 管理后台</h1>
    <p class="subtitle">幸运转盘 - 后台管理系统</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">🔐 登录</button>
      <button class="tab-btn" onclick="switchTab('apply')">📝 申请管理员</button>
    </div>

    <!-- 登录面板 -->
    <div id="panel-login" class="tab-panel active">
      <div class="form-group">
        <label>管理员账号</label>
        <input type="text" id="username" placeholder="请输入账号" autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-submit" onclick="login()">登 录</button>
      <p class="msg" id="loginMsg"></p>
    </div>

    <!-- 申请管理员面板 -->
    <div id="panel-apply" class="tab-panel">
      <div id="applyStatusBox" style="display:none;margin-bottom:12px;"></div>
      <div id="applyForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="applyUsername" placeholder="请输入申请用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="applyPassword" placeholder="设置管理员密码">
        </div>
        <div class="form-group">
          <label>申请理由</label>
          <textarea id="applyReason" placeholder="请简述申请成为管理员的理由..."></textarea>
        </div>
        <button class="btn-submit" onclick="submitApply()">📤 提交申请</button>
        <p class="msg" id="applyMsg"></p>
        <div style="margin-top:16px;text-align:center;">
          <button onclick="checkStatus()" style="background:none;border:none;color:#667eea;cursor:pointer;font-size:0.9rem;text-decoration:underline;">查询申请状态</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['login','apply'][i] === tab));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMsg('loginMsg', '❗ 请输入账号和密码', 'error');
        return;
      }

      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          showMsg('loginMsg', '❌ ' + data.error, 'error');
        } else {
          sessionStorage.setItem('adminUser', JSON.stringify(data));
          window.location.href = '/admin/dashboard.html';
        }
      })
      .catch(() => showMsg('loginMsg', '❌ 无法连接到服务器', 'error'));
    }

    function submitApply() {
      const username = document.getElementById('applyUsername').value.trim();
      const password = document.getElementById('applyPassword').value;
      const reason = document.getElementById('applyReason').value.trim();

      if (!username || !password) {
        showMsg('applyMsg', '❗ 请输入用户名和密码', 'error');
        return;
      }

      fetch('/api/admin/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, reason })
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          showMsg('applyMsg', '❌ ' + data.error, 'error');
        } else {
          showMsg('applyMsg', '✅ ' + data.message, 'success');
          document.getElementById('applyUsername').value = '';
          document.getElementById('applyPassword').value = '';
          document.getElementById('applyReason').value = '';
        }
      })
      .catch(() => showMsg('applyMsg', '❌ 无法连接到服务器', 'error'));
    }

    function checkStatus() {
      const username = document.getElementById('applyUsername').value.trim();
      if (!username) {
        showMsg('applyMsg', '❗ 请先输入用户名', 'error');
        return;
      }
      fetch('/api/admin/apply/status?username=' + encodeURIComponent(username))
        .then(r => r.json())
        .then(data => {
          const typeMap = { none: 'info', pending: 'info', approved: 'success', rejected: 'error' };
          showMsg('applyMsg', data.message, typeMap[data.status] || 'info');
        })
        .catch(() => showMsg('applyMsg', '❌ 无法连接到服务器', 'error'));
    }
  </script>
</body>
</html>
