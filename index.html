<!DOCTYPE html>
<html>
<head>
  <title>幸运转盘</title>
  <style>
    body { text-align:center; font-family: Arial; }

    #wheel {
      width:200px;
      height:200px;
      border:10px solid #f90;
      border-radius:50%;
      margin:20px auto;
      line-height:200px;
      font-size:20px;
      transition: transform 3s ease;
    }

    button { padding:10px 20px; margin:10px; font-size:16px; }

    .rule {
      width:90%;
      margin:auto;
      text-align:left;
      background:#f5f5f5;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>
<input id="username" placeholder="请输入用户名">
<body>

<h1>🎉 幸运转盘</h1>

<div id="wheel">🎯</div>

<p>积分：<span id="points">0</span></p>
<p>现金：<span id="cash">0</span></p>

<button onclick="register()">注册</button>
<button onclick="spin()">抽奖</button>
<button onclick="recharge()">充值</button>

<h2 id="result"></h2>

<!-- 游戏规则 -->
<div class="rule">
<h3>📜 游戏说明</h3>
<p>🎁 免费注册，注册即送100,000积分</p>
<p>🎯 50,000积分 = 2次抽奖</p>
<p>🏆 奖项：</p>
<ul>
<li>10000积分</li>
<li>20000积分</li>
<li>苹果手机</li>
<li>苹果耳机</li>
<li>10000越南盾现金</li>
</ul>
<p>💱 兑换比例：100积分 = 1越南盾</p>
<p>💰 满100万越南盾可提现</p>
</div>

<script>
const API = "https://lucky-spin-production.up.railway.app"; // ⚠️必须替换
let userId = "";

function register(){
  userId = document.getElementById("username").value;

  if(!userId){
    alert("请输入用户名");
    return;
  }

  fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({userId})
  })
  .then(r=>r.json())
  .then(d=>{
    updateUI(d);
    document.getElementById("result").innerText = "注册成功！";
  });
}

// 更新UI
function updateUI(data){
  document.getElementById("points").innerText = data.points;
  document.getElementById("cash").innerText = data.cash;
}

// 注册
function register(){
  fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({userId})
  })
  .then(r=>r.json())
  .then(d=>{
    updateUI(d);
    document.getElementById("result").innerText = "注册成功！";
  })
  .catch(()=>{
    alert("❌ 注册失败（检查API地址）");
  });
}

// 抽奖
function spin(){
  document.getElementById("wheel").style.transform =
    "rotate(" + (Math.random()*1000+1000) + "deg)";

  fetch(API + "/spin", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({userId})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.error){
      document.getElementById("result").innerText = d.error;
    }else{
      updateUI(d.user);
      document.getElementById("result").innerText =
        "🎉 中奖：" + JSON.stringify(d.reward);
    }
  })
  .catch(()=>{
    alert("❌ 抽奖失败（服务器没连上）");
  });
}

// 充值
function recharge(){
  alert(`
💰 充值方式：

MoMo / 银行 / Zalo
联系客服完成充值
`);
}
</script>

</body>
</html>
